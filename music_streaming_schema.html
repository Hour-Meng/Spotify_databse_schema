
<style>
#erd svg { width: 100%; }
.legend { display: flex; gap: 16px; margin: 12px 0 4px; flex-wrap: wrap; font-size: 12px; color: var(--color-text-secondary); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }
</style>
<div class="legend">
  <span><span class="legend-dot" style="background:#7F77DD"></span>Core entities</span>
  <span><span class="legend-dot" style="background:#1D9E75"></span>Junction tables</span>
  <span><span class="legend-dot" style="background:#888780"></span>Feature tables</span>
</div>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryBorderColor: dark ? '#7F77DD' : '#7F77DD',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
  },
});
const diagram = `erDiagram
  Users {
    int user_id PK
    varchar u_name
    varchar u_email
    varchar u_plan
  }
  Artists {
    int artist_id PK
    varchar a_name
    varchar a_genre
  }
  Albums {
    int album_id PK
    varchar album_name
    int artist_id FK
  }
  Tracks {
    int track_id PK
    varchar t_name
    int t_length
    int album_id FK
  }
  Playlists {
    int playlist_id PK
    varchar playlist_name
    int user_id FK
  }
  Playlist_Tracks {
    int playlist_id FK
    int track_id FK
    int order
  }
  Followers {
    int user_id FK
    int artist_id FK
  }
  Likes {
    int user_id FK
    int track_id FK
    datetime like_date_time
  }
  User_Tracks {
    int user_id FK
    int track_id FK
    int play_count
  }
  Payment {
    int payment_id PK
    int user_id FK
    decimal amount
  }
  Subscription_Plan {
    int subscription_plan_id PK
    varchar name
    decimal price
  }
  User_Subscription_Plan {
    int user_id FK
    int subscription_plan_id FK
  }
  Notification {
    int notification_id PK
    int user_id FK
    varchar title
  }

  Artists ||--o{ Albums : "makes"
  Albums ||--o{ Tracks : "contains"
  Users ||--o{ Playlists : "creates"
  Playlists ||--o{ Playlist_Tracks : "has"
  Tracks ||--o{ Playlist_Tracks : "in"
  Users ||--o{ Followers : "follows"
  Artists ||--o{ Followers : "followed by"
  Users ||--o{ Likes : "likes"
  Tracks ||--o{ Likes : "liked by"
  Users ||--o{ User_Tracks : "plays"
  Tracks ||--o{ User_Tracks : "played by"
  Users ||--o{ Payment : "makes"
  Users ||--o{ User_Subscription_Plan : "has"
  Subscription_Plan ||--o{ User_Subscription_Plan : "applied to"
  Users ||--o{ Notification : "receives"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
